version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:17"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    commit-message:
      prefix: deps(actions)
    labels:
      - dependencies
      - ci/cd
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:37"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    commit-message:
      prefix: deps(gradle)
    labels:
      - dependencies
      - "area: android"
    groups:
      gradle-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directories:
      - /crypto-core/native
      - /crypto-core/native/fuzz
      - /crypto-core/jni
    schedule:
      interval: weekly
      day: monday
      time: "04:57"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
    commit-message:
      prefix: deps(cargo)
    labels:
      - dependencies
      - "area: rust"
    groups:
      rust-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
